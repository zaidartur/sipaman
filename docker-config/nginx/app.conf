server {
    listen 8080;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    # --- Hardening umum ---
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # Aktifkan HSTS di sini HANYA jika TLS sudah wajib end-to-end (mis. di
    # belakang load balancer yang meneruskan trust HTTPS ke origin):
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size   50M;
    client_body_timeout    12s;
    client_header_timeout  12s;
    keepalive_timeout      15s;

    # Endpoint health-check untuk container orchestrator (tidak menyentuh PHP)
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Blokir akses ke seluruh dotfile/dotdir (.env, .git, .htaccess, dst)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Blokir file/berkas sensitif Laravel yang tidak boleh diakses publik
    location ~* ^/(storage/logs|bootstrap/cache|vendor|tests|database|\.env.*|composer\.(json|lock)|artisan)(/|$) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Cache aset statis
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf)$ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /index.php;
}
