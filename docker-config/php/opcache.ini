; OPcache — tuning production
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.max_wasted_percentage=10
; validate_timestamps=0 -> OPcache TIDAK mengecek perubahan file sumber.
; Ini tepat untuk image production yang immutable (kode dibekukan saat
; build). Jika kode di-mount sebagai volume yang bisa berubah saat
; runtime, ubah ke 1 atau restart php-fpm setiap deploy.
opcache.validate_timestamps=0
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT (opsional, PHP 8+). Nonaktifkan (opcache.jit=0) jika tidak yakin
; kompatibel dengan seluruh dependency aplikasi.
opcache.jit=tracing
opcache.jit_buffer_size=64M
