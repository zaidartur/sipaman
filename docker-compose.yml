services:
  # 1. Laravel Application Container (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel13-app
    container_name: laravel-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - .:/var/www
    networks:
      - laravel-network

  # 2. Nginx Web Server Container
  webserver:
    image: nginx:alpine
    container_name: laravel-webserver
    restart: unless-stopped
    tty: true
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker-config/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel-network
    depends_on:
      - app

  # 3. Node.js Container (Untuk Vite / Asset Compilation)
  node:
    image: node:22-alpine
    container_name: laravel-node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173" # Port default Vite
    environment:
      - NODE_ENV=development
    command: ["npm", "run", "dev", "--", "--host"]
    networks:
      - laravel-network

  # 4. MySQL Database Container
  db:
    image: mysql:8.0
    container_name: laravel-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  dbdata:
    driver: local