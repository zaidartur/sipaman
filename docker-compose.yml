services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Samakan dengan UID/GID user yang menjalankan `docker compose` di
        # host, supaya file yang ditulis container (termasuk log) tetap
        # bisa dibaca/ditulis host tanpa sudo. Jalankan:
        #   APP_UID=$(id -u) APP_GID=$(id -g) docker compose -f docker-compose.prod.example.yml build
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
        # APP_UID: 1000:-1000
        # APP_GID: 1000:-1000
    # image: ghcr.io/zaidartur/sipaman-app:v1.720   # sesuaikan tag hasil build
    restart: unless-stopped
    ports:
      - "8080:8080"          # taruh reverse proxy (Traefik/Nginx/ALB) di depan ini untuk TLS
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      # Kredensial MinIO (S3-compatible) tetap dari .env.production Anda:
      # FILESYSTEM_DISK=s3, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
      # AWS_ENDPOINT, AWS_USE_PATH_STYLE_ENDPOINT=true, dst.
    env_file:
      - .env
    volumes:
      # --- Bind mount storage/logs ke host agar laravel.log bisa dibaca
      #     langsung dari host (mis. `tail -f storage/logs/laravel.log`) ---
      - ./storage/logs:/var/www/storage/logs
      # Bagian storage lain yang tetap perlu writable secara lokal
      # (upload ke MinIO tidak butuh ini, tapi framework cache/session/view
      # tetap disimpan lokal oleh Laravel secara default):
      - ./storage/framework:/var/www/storage/framework
      - ./storage/app/private:/var/www/storage/app/private
      - cache_data:/var/www/bootstrap/cache
    # --- Hardening runtime ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN          # dibutuhkan entrypoint saat menyesuaikan permission volume
      - SETUID
      - SETGID
    read_only: false     # nginx/php-fpm perlu menulis ke beberapa path runtime;
                          # jika ingin read_only:true, tambahkan tmpfs di bawah
                          # untuk /tmp, /var/lib/nginx, /var/log/nginx, /run/nginx
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  cache_data:
