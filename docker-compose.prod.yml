services:
  # 1. Aplikasi Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: sipaman-app:prod
    container_name: prod-sipaman-app
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./.env:/var/www/.env
      - shared-storage:/var/www/public
      #- /c/laravel_storage/app/public:/var/www/storage/app/public
      - ./public/storage:/var/www/storage/app/public
      - app-source:/var/www
    networks:
      - prod-network

  # 2. Web Server Nginx
  webserver:
    image: nginx:alpine
    container_name: prod-sipaman-webserver
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./docker-config/nginx/app.conf:/etc/nginx/conf.d/default.conf
      - shared-storage:/var/www/public
      - shared-storage:/var/www/storage/app/public:/var/www/public/storage
      - app-source:/var/www
    networks:
      - prod-network
    depends_on:
      - app

networks:
  prod-network:
    driver: bridge

volumes:
  shared-storage:
  app-source: